version: '3.8'

services:
  mysql_db:
    image: mysql:8.4
    container_name: vd_mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      # Expose only to localhost (127.0.0.1) to avoid public exposure
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u$$DB_USER", "-p$$DB_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vd_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vd_backend
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Inject actual DB host to connect internally in the Docker network
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql_db:3306/${DB_NAME}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
    depends_on:
      mysql_db:
        condition: service_healthy
    networks:
      - vd_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vd_frontend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    networks:
      - vd_network

volumes:
  mysql-data:
    name: vd_mysql_data

networks:
  vd_network:
    name: vd_network
