version: '3.8'

services:
  mysql_db:
    image: mysql:8.4
    container_name: stockflow_mysql_db
    restart: always
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      # Expose only to localhost (127.0.0.1) to avoid public exposure
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u$$DB_USER", "-p$$DB_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stockflow_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockflow_backend
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Inject actual DB host to connect internally in the Docker network
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql_db:3306/${DB_NAME}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8"
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
    depends_on:
      mysql_db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - stockflow_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stockflow_frontend
    restart: always
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      BACKEND_URL: http://backend:8080
    networks:
      - stockflow_network

volumes:
  mysql-data:
    name: stockflow_mysql_data

networks:
  stockflow_network:
    name: stockflow_network
