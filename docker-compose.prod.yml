version: '3.8'

services:
  mysql_db:
    image: mysql:8.4
    container_name: stockflow_mysql_db_prod
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
    volumes:
      - mysql-prod-data:/var/lib/mysql
    # Database is not exposed to the public internet, only available internally
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u$$DB_USER", "-p$$DB_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - stockflow_net_prod

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockflow_backend_prod
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql_db:3306/${DB_NAME}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      REFRESH_TOKEN_EXPIRATION: ${REFRESH_TOKEN_EXPIRATION}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      QR_BASE_URL: ${QR_BASE_URL}
    depends_on:
      mysql_db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - stockflow_net_prod

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stockflow_frontend_prod
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - stockflow_net_prod

  nginx:
    image: nginx:1.25-alpine
    container_name: stockflow_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docs/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docs/nginx/certs:/etc/nginx/certs:ro
      - ./docs/nginx/certbot-webroot:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - stockflow_net_prod

  certbot:
    image: certbot/certbot:v2.10.0
    container_name: stockflow_certbot_prod
    restart: always
    volumes:
      - ./docs/nginx/certs:/etc/letsencrypt
      - ./docs/nginx/certbot-webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - stockflow_net_prod

volumes:
  mysql-prod-data:
    name: stockflow_mysql_prod_data

networks:
  stockflow_net_prod:
    name: stockflow_network_prod
