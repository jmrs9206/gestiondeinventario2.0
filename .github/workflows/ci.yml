name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test Backend
        run: mvn clean verify

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Run Tests
        run: npm run test

      - name: Audit Production Dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Build Production Bundle
        run: npm run build

  docker-build:
    name: Docker Build Check & Security Scan
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          load: true
          tags: stockflow-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner on Backend Image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'stockflow-backend:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          db-repository: 'public.ecr.aws/aquasecurity/trivy-db:2'
          java-db-repository: 'public.ecr.aws/aquasecurity/trivy-java-db:1'

      - name: Build Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          load: true
          tags: stockflow-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner on Frontend Image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'stockflow-frontend:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          db-repository: 'public.ecr.aws/aquasecurity/trivy-db:2'

  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up environment
        run: cp .env.example .env && cp .env.example frontend/.env

      - name: Start Database and Backend via Docker Compose
        run: |
          docker compose down -v --remove-orphans
          docker compose up -d mysql_db backend

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Wait for Backend Health Check
        run: |
          echo "Waiting for backend on http://127.0.0.1:8080/api/v1/health to respond with UP..."
          timeout 120s bash -c 'until curl -fsS http://127.0.0.1:8080/api/v1/health | grep -q "UP"; do echo -n "."; sleep 2; done'
          echo -e "\nBackend is up!"

      - name: Build Frontend for E2E
        working-directory: frontend
        run: npm run build

      - name: Run Playwright E2E Tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload E2E Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Stop Containers
        if: always()
        run: docker compose down -v --remove-orphans
